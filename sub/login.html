<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 모두매쓰</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="login" class="auth-body">

<main class="auth-page">
  <div class="auth-card">

    <a href="../index.html" class="auth-logo">
      <img src="../images/logo.png" alt="모두매쓰">
    </a>

    <h1 class="auth-title">모두매쓰 계정으로 간편 로그인</h1>

    <div class="auth-social">
      <button type="button" class="social-btn">
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.5 6.1 29.5 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-2.1 13.9-5.4l-6.4-5.4c-2.1 1.6-4.7 2.8-7.5 2.8-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4 5.6l6.4 5.4C37.2 39.6 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        Google 계정으로 로그인하기
      </button>
      <button type="button" class="social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="4" fill="#03C75A"/><path fill="#fff" d="M13.9 6.5v5.4L10 6.5H6.5v11H10v-5.4l3.9 5.4h3.6v-11z"/></svg>
        Naver 계정으로 로그인하기
      </button>
    </div>

    <div class="auth-divider"><span>이메일로 가입</span></div>

    <form class="auth-form" onsubmit="return false;">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="이메일" autocomplete="email">

      <label for="password">비밀번호</label>
      <div class="pw-field">
        <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
        <button type="button" class="pw-toggle" aria-label="비밀번호 표시">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" class="btn btn--primary auth-submit">회원가입</button>
    </form>

  </div>
</main>

<script>
  /* 비밀번호 표시 토글 */
  document.querySelector('.pw-toggle').addEventListener('click', function () {
    var pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.classList.toggle('is-on');
  });
</script>
</body>
</html>
